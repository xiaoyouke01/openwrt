name: immortalwrt-24.10-mt798x-armv8

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_NAME: openwrt
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/immortalwrt_24.10_mt798x.config
  DIY_P1_SH: scripts/sh/immortalwrt_diy-part1.sh
  DIY_P2_SH: scripts/immortalwrt_24.10_mt798x.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: 环境清理与依赖安装
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/free-diy/openwrt/main/depends_ubuntu_2204) -y
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下载固件源码
      run: |
        git clone -b $REPO_BRANCH --depth 1 $REPO_URL $REPO_NAME
        echo "SDK_PATH=$GITHUB_WORKSPACE/$REPO_NAME" >> $GITHUB_ENV

    - name: Cache Feeds
      uses: actions/cache@v4
      with:
        path: ${{ env.REPO_NAME }}/feeds
        key: ${{ runner.os }}-feeds-${{ hashFiles('**/feeds.conf.default') }}
        restore-keys: ${{ runner.os }}-feeds-

    - name: 加载自定义设置 (Part 1)
      run: |
        [ -e $FEEDS_CONF ] && cp -f $FEEDS_CONF $REPO_NAME/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd $REPO_NAME
        $GITHUB_WORKSPACE/$DIY_P1_SH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 更改设置 (Part 2)
      run: |
        [ -d files ] && cp -rf files $REPO_NAME/files
        [ -f $CONFIG_FILE ] && cp -f $CONFIG_FILE $REPO_NAME/.config
        chmod +x $DIY_P2_SH
        cd $REPO_NAME
        $GITHUB_WORKSPACE/$DIY_P2_SH
        make defconfig

    - name: Cache DL
      uses: actions/cache@v4
      with:
        path: ${{ env.REPO_NAME }}/dl
        key: ${{ runner.os }}-dl-${{ hashFiles('**/.config') }}
        restore-keys: ${{ runner.os }}-dl-

    - name: 下载固件依赖包 (DL)
      run: |
        cd $REPO_NAME
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 开始编译固件
      id: compile
      run: |
        cd $REPO_NAME
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: 检查磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理编译产物
      id: organize
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p $GITHUB_WORKSPACE/firmware_output
        
        find $REPO_NAME/bin/targets/ -type f -name "*squashfs-sysupgrade.bin" -exec cp {} $GITHUB_WORKSPACE/firmware_output/ \;
        
        # 检查是否成功抓取到文件
        if [ -z "$(ls -A $GITHUB_WORKSPACE/firmware_output)" ]; then
          echo "Error: 找不到 sysupgrade.bin 固件，请检查编译配置。"
          exit 1
        fi
        
        echo "FIRMWARE_PATH=$GITHUB_WORKSPACE/firmware_output" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布 Release
      if: steps.organize.outputs.status == 'success'
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.REPO_NAME }}
        tag: ${{ env.REPO_BRANCH }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **构建信息：**
          - 📅 日期: ${{ env.DATE }}
          - 🔗 源码: ${{ env.REPO_URL }} / ${{ env.REPO_BRANCH }}
          - 📂 默认地址: 192.168.100.252
          - 🔑 默认密码: 无

    - name: 清理旧版本 (保留最新 3 个)
      if: steps.organize.outputs.status == 'success'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        RELEASES=$(gh release list --limit 100 --json tagName --jq '.[].tagName')
        COUNT=0
        for TAG in $RELEASES; do
          COUNT=$((COUNT + 1))
          if [ $COUNT -gt 3 ]; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi
        done
