name: immortalwrt-24.10-x86-lite

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: configs/immortalwrt_24.10_x86.config
  DIY_P1_SH: scripts/sh/immortalwrt_diy-part1.sh
  DIY_P2_SH: scripts/immortalwrt_24.10_x86.sh
  CLASH_KERNEL: amd64
  CACHE_TOOLCHAIN: true
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: immortalwrt-24.10-x86-lite
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: 极限释放磁盘空间
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 深度清理系统冗余 (修复版)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 1. 删除大容量目录
        sudo docker image prune -a -f
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules
        sudo rm -rf /etc/mysql /etc/php /usr/local/graalvm /usr/local/.ghcup
        
        # 2. 针对性清理软件包 (添加 || true 容错，防止 Exit Code 100)
        sudo -E apt -qq update
        sudo -E apt -qq purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* php* mongodb* moby* snap* -y || true
        
        # 3. 升级并安装依赖
        sudo -E apt -qq full-upgrade -y
        sudo -E apt -qq install $(curl -fsSL https://raw.githubusercontent.com/free-diy/openwrt/main/depends_ubuntu_2204) -y
        sudo -E apt -qq autoremove --purge -y
        sudo -E apt -qq clean
        
        # 4. 环境配置
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$(id -gn) /workdir
        echo "当前可用磁盘空间："
        df -h /

    - name: 下载固件源码
      working-directory: /workdir
      run: |
        git clone -b $REPO_BRANCH --single-branch --filter=blob:none $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        echo "COMMIT_AUTHOR=$(git show -s --date=short --format="%an")" >> $GITHUB_ENV
        echo "COMMIT_DATE=$(git show -s --date=short --format="%ci")" >> $GITHUB_ENV
        echo "COMMIT_MESSAGE=$(git show -s --date=short --format="%s")" >> $GITHUB_ENV

    - name: 环境变量预处理
      run: |
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        echo "SOURCE_REPO=$(echo $REPO_URL | awk -F '/' '{print $(NF)}')" >> $GITHUB_ENV
        DEVICE_TARGET=$(grep CONFIG_TARGET_BOARD .config | cut -d '"' -f2 || echo "x86")
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(grep CONFIG_TARGET_SUBTARGET .config | cut -d '"' -f2 || echo "64")
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV

    - name: 缓存 Toolchain
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: false
        mixkey: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}
        prefix: ${{ env.OPENWRT_PATH }}        
        
    - name: 加载自定义设置 (Part 1)
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF $OPENWRT_PATH/feeds.conf.default
        chmod +x $DIY_P1_SH
        $GITHUB_WORKSPACE/$DIY_P1_SH
        
    - name: 更新插件源
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 更改设置 (Part 2)
      run: |
        [ -e files ] && mv files $OPENWRT_PATH/files
        [ -e $CONFIG_FILE ] && cp $CONFIG_FILE $OPENWRT_PATH/.config
        chmod +x $DIY_P2_SH
        cd $OPENWRT_PATH
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载编译依赖库 (DL)
      run: |
        cd $OPENWRT_PATH
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: 开始编译固件
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) 线程编译中..."
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M")" >> $GITHUB_ENV
        
    - name: 整理成品文件
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        rm -rf packages *.buildinfo *.manifest *kernel.bin *rootfs.img.gz profiles.json sha256sums
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: 发布 Release
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        tag: ${{ env.FIRMWARE_TAG }}-${{ github.run_number }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **🔥 ImmortalWrt x86-Lite 构建成功**
          - 📅 源码时间: ${{ env.COMMIT_DATE }}
          - 📝 提交内容: ${{ env.COMMIT_MESSAGE }}
          - 🚀 构建编号: ${{ github.run_number }}
          - 🌐 默认后台: 192.168.100.252 (密码为空)

    - name: 历史版本清理 (保留 3 份)
      if: steps.compile.outputs.status == 'success' && !cancelled()
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # 获取属于该 Tag 前缀的所有 Release
        RELEASES=$(gh release list --limit 100 --json tagName --jq ".[] | select(.tagName | startswith(\"${{ env.FIRMWARE_TAG }}-\")) | .tagName")
        COUNT=0
        for TAG in $RELEASES; do
          COUNT=$((COUNT + 1))
          if [ $COUNT -gt 3 ]; then
            echo "正在清理旧版本: $TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          fi
        done
